name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Windows PowerShell 5.1)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          if (-not (Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
          }

          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.5.0 -AllowClobber
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run ScriptAnalyzer (Error severity)
        shell: powershell
        run: |
          Import-Module PSScriptAnalyzer
          $settingsPath = Join-Path $env:GITHUB_WORKSPACE ".psscriptanalyzer.psd1"
          $targets = Join-Path $env:GITHUB_WORKSPACE "hybrID"
          $results = Invoke-ScriptAnalyzer -Path $targets -Recurse -Settings $settingsPath

          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer reported $($results.Count) issue(s)."
          }

      - name: Run Pester tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = Join-Path $env:GITHUB_WORKSPACE "tests"
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = Join-Path $env:GITHUB_WORKSPACE "TestResults.xml"
          $config.TestResult.OutputFormat = "NUnitXml"
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: TestResults.xml
